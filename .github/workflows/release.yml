name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (e.g. 1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version '$VERSION' (expected semver like 1.0.0 or 1.0.0-rc.1)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )
          for target in "${targets[@]}"; do
            set -- $target
            os=$1
            arch=$2
            ext=""
            if [[ "$os" == "windows" ]]; then
              ext=".exe"
            fi
            out="dist/hushify_${VERSION}_${os}_${arch}${ext}"
            echo "Building $out"
            GOOS="$os" GOARCH="$arch" go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "$out" \
              .
          done
          (cd dist && sha256sum hushify_*) > dist/checksums.txt
          ls -la dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          args=(
            "$TAG"
            dist/hushify_*
            dist/checksums.txt
            --title "$TAG"
            --generate-notes
            --target "${{ github.sha }}"
          )
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
